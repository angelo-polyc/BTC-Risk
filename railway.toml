# Railway config for the BTC drawdown-probability model.
#
# Single-service config for the `web` service (FastAPI + MCP, always-on).
#
# IMPORTANT: Railway's railway.toml supports ONLY ONE service per file.
# The cron service (daily_pipeline.py --once at 22:00 UTC) is NOT
# configured here — it must be created manually in the Railway dashboard
# from the same repo, with its startCommand and cron schedule set in the
# service UI (Settings → Deploy).
#
# PORT expansion: Railway does not run startCommand through a shell, so
# ${PORT:-8000} passed as a literal to uvicorn in a previous attempt.
# This version wraps the command in `sh -c '... exec ...'` so the shell
# expands ${PORT:-8000} at runtime. `exec` replaces the shell with
# uvicorn so tini's SIGTERM forwarding still reaches the app.
#
# Railway injects its own PORT env var (usually not 8000). The proxy
# routes external traffic to *that* injected port — if uvicorn binds to
# a hardcoded 8000 instead, the healthcheck fails with connection
# refused. ${PORT:-8000} picks up Railway's injection when present and
# falls back to 8000 for local `docker run`.
#
# See RAILWAY_MIGRATION.md for the full setup flow.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'exec python3 -m uvicorn api_server:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/docs"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
