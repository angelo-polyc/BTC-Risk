# Railway config for the BTC drawdown-probability model.
#
# Single service, no volume. runner.sh (invoked by the Dockerfile CMD)
# launches daily_pipeline.py's APScheduler in the background and uvicorn
# in the foreground, both in the same container.
#
# Why no volume (for now): Railway uses bind mounts, so mounting a volume
# at /app SHADOWS the code baked into the image and the app fails to
# import. The proper fix is to refactor all writers to use /app/data and
# mount the volume there — but that's a real refactor. For today, the
# container filesystem is ephemeral across deploys but persists across
# restarts, and freshness is handled by:
#   - run_on_startup: true in runtime_config.yaml → pipeline runs on boot
#   - APScheduler's daily cron (22:00 UTC) → runs every 24h thereafter
# So every deploy gets a fresh cold pull from the data sources.
#
# Why not a separate cron service: Railway does NOT support shared
# volumes between services, and each service is capped at one volume.
# A separate cron container would write to an ephemeral filesystem the
# web service can't see. So we collapse to the single-service design
# runner.sh was already built for. The APScheduler approach was only
# problematic on Replit because Replit's supervisor kept killing
# backgrounded processes — Railway does not have that behavior.
#
# PORT: runner.sh handles ${PORT:=8000} internally via bash, so Railway's
# injected PORT is picked up automatically. No sh -c wrapper needed.
#
# Startup flow:
#   tini (PID 1)  →  bash runner.sh  →  [bg] python3 daily_pipeline.py
#                                     →  [fg] exec python3 -m uvicorn ...

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Explicit is better than implicit — this matches the Dockerfile CMD.
startCommand = "bash runner.sh"
healthcheckPath = "/docs"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
